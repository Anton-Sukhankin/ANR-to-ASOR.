<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S.Cost table prototype</title>
    <link rel="stylesheet" href="styles.css?v=data-foundation" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-top">
        <button class="icon-button header-icon" aria-label="Открыть приложения">▦</button>
        <div class="brand-mark" aria-hidden="true">▤</div>
        <strong class="brand-name">S.Cost</strong>
        <span class="stage-badge">STAGE</span>
        <div class="header-spacer"></div>
        <a class="header-link" href="#">Аналитика</a>
        <a class="header-link" href="#">Помощь</a>
        <button class="icon-button header-icon" aria-label="Уведомления">⌂</button>
        <div class="avatar" aria-label="Профиль пользователя"></div>
      </div>
      <nav class="header-nav" aria-label="Основная навигация">
        <a class="nav-pill active" href="#">Расчет стоимости</a>
        <a href="#">Произвольный расчет</a>
        <a href="#">Накопительная</a>
        <a href="#">Архив</a>
        <a href="#">Расценки</a>
        <a href="#">Справочники</a>
        <a href="#">Рассылки</a>
        <a href="#">Еще⌄</a>
      </nav>
    </header>

    <main class="cost-page">
      <section class="titlebar" aria-label="Панель расчета">
        <div class="title-row">
          <button class="back-button" aria-label="Назад">‹</button>
          <h1>АСОР <a href="#">№67408</a> ТЧА_1 оч_К1.2-1 ж.д.</h1>
          <button class="doc-button" aria-label="Открыть карточку расчета">▤</button>
          <button class="primary-action">
            <svg class="accordion-arrow-icon primary-action-arrow" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="m7 10 5 5 5-5"></path>
            </svg>
            <span>Отправлен Суперсметчику</span>
          </button>
          <div class="tool-group">
            <button class="toolbar-square toolbar-square-accent" aria-label="Связи">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M7 6.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Z"></path>
                <path d="M22 5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Z"></path>
                <path d="M11.5 19a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Z"></path>
                <path d="M6.8 7.4 17.2 5.8"></path>
                <path d="M5.5 8.9 8.4 16.7"></path>
              </svg>
            </button>
            <button class="toolbar-square" aria-label="Документы">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <rect x="5" y="3.5" width="14" height="17" rx="3"></rect>
                <path d="M8.5 8.2h2.2"></path>
                <path d="M13.2 8.2h2.3"></path>
                <path d="M8.5 12h7"></path>
                <path d="M8.5 15.7h5.4"></path>
                <path d="m8.5 9.9 1.1 1.1 2-2.2"></path>
              </svg>
            </button>
            <button class="toolbar-square" aria-label="Вложения">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="m9.2 12.6 5.7-5.7a3.2 3.2 0 0 1 4.5 4.5l-7.2 7.2a5 5 0 0 1-7.1-7.1l7.7-7.7"></path>
                <path d="m12.1 9.7-5.3 5.3a1.7 1.7 0 0 0 2.4 2.4l6.9-6.9"></path>
              </svg>
            </button>
            <button class="toolbar-square" aria-label="Комментарии">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M6.2 5.5h11.6a3 3 0 0 1 3 3v5.4a3 3 0 0 1-3 3h-5.1l-4.4 3v-3H6.2a3 3 0 0 1-3-3V8.5a3 3 0 0 1 3-3Z"></path>
                <path d="M8 10.2h8"></path>
                <path d="M8 13h5.2"></path>
              </svg>
            </button>
            <button class="toolbar-square toolbar-square-accent" aria-label="Еще">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="m6.5 9 5.5 5.5L17.5 9"></path>
              </svg>
            </button>
          </div>
          <span class="source-chip">1C.БитФинанс</span>
          <button class="ai-review-button" id="openReviewDrawer" type="button" aria-label="Открыть проверку ИИ-позиций">
            <span class="ai-review-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 3l1.9 5.3L19 10l-5.1 1.7L12 17l-1.9-5.3L5 10l5.1-1.7Z"></path>
                <path d="M18 15l.8 2.2L21 18l-2.2.8L18 21l-.8-2.2L15 18l2.2-.8Z"></path>
              </svg>
            </span>
            <span id="reviewButtonText">Проверка ИИ</span>
          </button>
          <div class="toolbar-spacer"></div>
          <button class="toolbar-square toolbar-more-button" aria-label="Меню">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M5 12h.01"></path>
              <path d="M12 12h.01"></path>
              <path d="M19 12h.01"></path>
            </svg>
          </button>
          <button class="filter-button">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M4 5h16l-6 7v5l-4 2v-7Z"></path>
            </svg>
            <span>Фильтр</span>
          </button>
          <button class="view-button">
            <svg class="toolbar-chevron" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="m7 10 5 5 5-5"></path>
            </svg>
            <span>Вид от Суперсметчика</span>
          </button>
          <div class="segmented" aria-label="Переключатель вида">
            <button aria-label="Таблица">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M5 5h14v14H5Z"></path>
                <path d="M5 10h14"></path>
                <path d="M5 14h14"></path>
                <path d="M10 5v14"></path>
                <path d="M14 5v14"></path>
              </svg>
            </button>
            <button class="selected" aria-label="Список">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M6 5h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"></path>
                <path d="M8 9h8"></path>
                <path d="M8 12h8"></path>
                <path d="M8 15h5"></path>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <section class="table-shell" aria-label="Таблица расчета стоимости">
        <div class="table-scroll" id="tableScroll">
          <table class="cost-table" aria-label="АСОР №67408">
            <colgroup id="columnWidths"></colgroup>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <aside class="review-drawer" id="reviewDrawer" aria-label="Проверка ИИ-позиций" aria-hidden="true">
        <div class="review-drawer-head">
          <div class="review-title-block">
            <h2 id="reviewContextTitle">Проверка позиций</h2>
            <div class="review-header-meta" id="reviewHeaderMeta"></div>
          </div>
          <div class="review-head-actions">
            <p class="review-kicker" id="reviewCollisionType">Проверка ИИ</p>
            <button class="review-close" id="closeReviewDrawer" type="button" aria-label="Закрыть">×</button>
          </div>
        </div>
        <div class="review-body">
          <section class="position-accordion collapsed" id="positionAccordion">
            <button class="position-accordion-head" id="positionAccordionToggle" type="button" aria-expanded="false" aria-controls="positionAccordionPanel">
              <span>Список позиций</span>
              <span class="position-accordion-icon" id="positionAccordionIcon" aria-hidden="true">
                <svg class="accordion-arrow-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="m7 10 5 5 5-5"></path>
                </svg>
              </span>
            </button>
            <div class="position-accordion-panel" id="positionAccordionPanel">
              <div class="position-control-row">
                <div class="review-filters" id="reviewFilters" aria-label="Фильтры проверки"></div>
                <div class="review-position-nav" aria-label="Навигация по позициям">
                  <button class="review-nav-button" id="prevReviewIssue" type="button" title="Предыдущая позиция" aria-label="Предыдущая позиция"></button>
                  <button class="review-nav-button" id="nextReviewIssue" type="button" title="Следующая позиция" aria-label="Следующая позиция"></button>
                </div>
              </div>
              <div class="review-list" id="reviewList" aria-label="Список предупреждений и ошибок"></div>
            </div>
          </section>
          <div class="review-detail" id="reviewDetail" aria-label="Карточка проверки"></div>
        </div>
      </aside>
    </main>

    <footer class="cost-footer">
      <label class="footer-control">
        <span>Ставка НДС:</span>
        <select aria-label="Ставка НДС">
          <option>5%</option>
          <option>0%</option>
          <option>20%</option>
        </select>
      </label>
      <label class="footer-check">
        <input type="checkbox" />
        <span>Разница подрядчика</span>
      </label>
      <div class="footer-total">
        <span>Основные материалы:</span>
        <strong>17 521 953,80</strong>
      </div>
      <div class="footer-total">
        <span>СМР:</span>
        <strong>8 702 357,28</strong>
      </div>
      <div class="footer-total">
        <span>Всего:</span>
        <strong>26 224 311,08</strong>
      </div>
    </footer>

    <script src="data/project-data.js?v=data-foundation"></script>
    <script src="app.js?v=data-foundation"></script>
  </body>
</html>
